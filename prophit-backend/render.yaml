# Render.com — one-file deploy config. Push this repo to GitHub, then
# Render → New → Blueprint → pick the repo. It reads this file automatically.
services:
  - type: web
    name: prophit-backend
    runtime: docker
    plan: starter          # $7/mo; use "free" to trial (free spins down when idle)
    healthCheckPath: /api/health
    envVars:
      - key: THE_ODDS_API_KEY
        sync: false        # you paste this in the Render dashboard (kept secret)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: ENABLED_SPORTS
        value: soccer,tennis,nba
      - key: ODDS_REGIONS
        value: eu,uk
      - key: DB_PATH
        value: /data/prophit.db
    disk:
      name: prophit-data   # persistent storage so picks/history survive deploys
      mountPath: /data
      sizeGB: 1
