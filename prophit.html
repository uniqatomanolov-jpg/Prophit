<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#070D14" />
<meta name="description" content="ORAKL — quantitative line arbitrage. Claude prices every market against the bookmakers and surfaces the edges worth backing, with a fully transparent track record." />
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><rect width="40" height="40" rx="9" fill="%23070D14"/><circle cx="20" cy="20" r="10.5" fill="none" stroke="%2300F0FF" stroke-width="2.4"/><path d="M17.4 10.2 A10.5 10.5 0 0 0 17.4 29.8 Z" fill="%2300F0FF"/><line x1="20" y1="3.5" x2="20" y2="36.5" stroke="%2300F0FF" stroke-width="2.1" stroke-linecap="round"/></svg>'>
<title>ORAKL — Claude vs the Bookies</title>
<meta property="og:title" content="ORAKL — Claude vs the Bookies">
<meta property="og:description" content="Quantitative line arbitrage across live markets. Every pick public, every result graded — no fake numbers, ever.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="ORAKL — Claude vs the Bookies">
<meta name="twitter:description" content="Claude prices every market against the bookmaker’s line and isolates the edges worth backing.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');
:root{
 --bg:#070D14; --panel:#0D1724; --panel2:#0A121D; --raise:#122034;
 --line:#1B2B3F; --line-soft:#162235;
 --ink:#FFFFFF; --muted:#7E8C9D; --dim:#5D6B7C;
 --claude:#00F0FF; --value:#00E676; --book:#E0A94F; --loss:#FF3860;
 --ink-2:#C3CDE0; --radius-md:8px; --radius-lg:12px;
}
*{box-sizing:border-box;margin:0;}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
body::before{content:"";position:fixed;inset:-20%;z-index:-1;pointer-events:none;background:radial-gradient(46% 34% at 30% 12%,rgba(0,240,255,.13),transparent 65%),radial-gradient(38% 30% at 78% 8%,rgba(0,230,118,.09),transparent 65%),radial-gradient(30% 26% at 60% 40%,rgba(0,240,255,.05),transparent 70%);animation:aurora 26s ease-in-out infinite alternate;}@keyframes aurora{0%{transform:translate3d(-2%,-1%,0) scale(1);}50%{transform:translate3d(2%,2%,0) scale(1.06);}100%{transform:translate3d(-1%,3%,0) scale(1.02);}}
.app{min-height:100vh;}
.shell{max-width:1220px;margin:0 auto;padding:22px 22px 80px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
button:focus-visible{outline:2px solid var(--claude);outline-offset:2px;border-radius:8px;}
b,strong{font-weight:600;}
.mono,.pconf,.odd,.eg-scale,.rec,.acc,.stat b,.hstat b,.valbadge{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}

/* header */
.hdr{display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:11px;}
.logo{display:block;filter:drop-shadow(0 0 14px rgba(0,240,255,.55));}
.mark{font-family:'Space Grotesk';font-weight:700;font-size:25px;letter-spacing:-.5px;}
.mark span{color:var(--claude);}
.tagline{color:var(--muted);font-size:13.5px;margin:6px 0 16px;}
.gopro{background:linear-gradient(135deg,var(--claude),#5FF9FF);color:#08101F;font:600 13px 'Space Grotesk';letter-spacing:.2px;padding:9px 16px;border-radius:var(--radius-md);box-shadow:0 12px 26px -12px rgba(0,240,255,.7);}
.adminbtn{background:var(--raise);color:var(--muted);font:600 12px 'Inter';padding:8px 13px;border-radius:var(--radius-md);border:1px solid var(--line);}
.adminbtn.on{color:var(--value);border-color:rgba(0,230,118,.5);}

/* tabs */
.tabs{display:flex;gap:20px;border-bottom:1px solid var(--line);margin-bottom:20px;position:sticky;top:0;background:linear-gradient(var(--bg) 72%,transparent);z-index:5;backdrop-filter:blur(8px);}
.tab{color:var(--muted);padding:12px 2px;font:600 14px 'Inter';border-bottom:2px solid transparent;letter-spacing:.1px;}
.tab.on{color:var(--ink);border-bottom-color:var(--claude);}

/* hero */
.hero{margin:2px 0 22px;}
.hero-eyebrow{font:600 11px 'IBM Plex Mono';letter-spacing:2.5px;text-transform:uppercase;color:var(--claude);}
.hero-h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(30px,4.6vw,50px);line-height:1.02;letter-spacing:-1.4px;margin:12px 0 12px;max-width:900px;}
.hero-h1 em{font-style:normal;color:var(--value);}
.hero-sub{color:var(--muted);font-size:15px;line-height:1.55;max-width:620px;margin-bottom:20px;}
.hero-stats{display:flex;gap:14px;flex-wrap:wrap;}
.hstat{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius-lg);padding:14px 18px;min-width:130px;}
.hstat b{display:block;font-size:26px;color:var(--ink);letter-spacing:-.5px;}
.hstat b.val{color:var(--value);}
.hstat span{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;}

/* sport chips */
.sports{display:flex;gap:9px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;}
.sports::-webkit-scrollbar{height:0;}
.sport{flex:0 0 auto;padding:9px 15px;border-radius:var(--radius-md);border:1px solid var(--line);background:var(--panel);color:var(--muted);font:600 13.5px 'Inter';white-space:nowrap;transition:.15s;}
.sport:hover{border-color:#2C3B57;color:var(--ink-2);}
.sport.on{background:var(--claude);border-color:var(--claude);color:#08101F;}
.sport b{opacity:.65;margin-left:3px;font-family:'IBM Plex Mono';}
.freeline{color:var(--claude);font-size:12.5px;margin:2px 0 16px;}

/* match card */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;align-items:start;}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius-lg);padding:16px;transition:border-color .16s,transform .16s,box-shadow .16s;}
.card:hover{border-color:#2C3B57;transform:translateY(-3px);box-shadow:0 22px 50px -28px rgba(0,0,0,.9);}
.card-top{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:12px;}
.eyebrow{font:600 10.5px 'IBM Plex Mono';letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-right{display:flex;align-items:center;gap:8px;flex:0 0 auto;}
.free-badge{font:600 9px 'IBM Plex Mono';color:#08140C;background:var(--value);padding:2px 6px;border-radius:5px;letter-spacing:.5px;}
.time{font:500 11.5px 'IBM Plex Mono';color:var(--dim);}
.time.final{color:var(--value);}
.matchup{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
.team{flex:1;font-family:'Space Grotesk';font-weight:600;font-size:19px;letter-spacing:-.4px;line-height:1.12;overflow-wrap:anywhere;}
.team.away{text-align:right;}
.vs{color:var(--dim);font-size:10px;font-family:'IBM Plex Mono';letter-spacing:1px;}
.score{font-family:'IBM Plex Mono';font-size:14px;color:var(--value);}

.mkt-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.mkt{padding:6px 11px;border-radius:8px;border:1px solid var(--line);color:var(--muted);font:500 12px 'Inter';transition:.14s;}
.mkt:hover{color:var(--ink-2);border-color:#2C3B57;}
.mkt.on{background:var(--raise);border-color:var(--claude);color:var(--claude);}
.odds{display:flex;gap:8px;margin-bottom:14px;}
.odd{flex:1;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius-md);padding:7px 4px;font-family:'IBM Plex Mono';font-size:14px;color:var(--ink-2);}
.odd span{display:block;font:600 9.5px 'IBM Plex Mono';color:var(--dim);letter-spacing:1px;}

/* CLAUDE VERDICT — the signature */
.cverdict{border-top:1px solid var(--line-soft);padding-top:13px;}
.cv-head{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap;}
.cv-tag{font:600 10px 'IBM Plex Mono';letter-spacing:1.4px;text-transform:uppercase;color:var(--claude);}
.cv-pick{font-family:'Space Grotesk';font-weight:600;font-size:16px;color:var(--ink);flex:1;min-width:0;}
.valbadge{font:600 11px 'IBM Plex Mono';color:#08140C;background:var(--value);padding:3px 8px;border-radius:6px;letter-spacing:.2px;box-shadow:0 6px 16px -6px rgba(0,230,118,.7);}
.noedge{font:500 10px 'IBM Plex Mono';color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
.grade{width:18px;text-align:center;font-weight:700;}
.grade.w{color:var(--value);}.grade.l{color:var(--loss);}
/* edge gauge */
.egauge{position:relative;height:8px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);margin-bottom:7px;overflow:visible;}
.eg-book{position:absolute;left:0;top:0;bottom:0;background:rgba(224,169,79,.28);border-radius:6px 0 0 6px;}
.eg-gap{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,rgba(0,230,118,.35),rgba(0,230,118,.75));box-shadow:0 0 14px rgba(0,230,118,.55);}
.eg-mark{position:absolute;top:-3px;width:2px;height:14px;border-radius:2px;transform:translateX(-1px);}
.eg-mark.eg-b{background:var(--book);}
.eg-mark.eg-c{background:var(--claude);box-shadow:0 0 10px rgba(0,240,255,.8);}
.eg-scale{display:flex;justify-content:space-between;font:600 10px 'IBM Plex Mono';margin-bottom:9px;}
.eg-lb{color:var(--book);}.eg-lc{color:var(--claude);}
.cv-why{font-size:12.5px;line-height:1.5;color:var(--muted);font-style:italic;border-left:2px solid var(--line);padding-left:10px;}
.nopick{margin-top:6px;padding:11px 13px;border:1px dashed var(--line);border-radius:var(--radius-md);color:var(--dim);font-size:12.5px;}
.locked{display:block;width:100%;text-align:left;border-top:1px solid var(--line-soft);padding-top:13px;margin-top:2px;}
.locked-t{display:block;font-size:12.5px;color:var(--ink-2);}
.locked-t b{color:var(--value);font-family:'IBM Plex Mono';}
.ctrack,.seg,.pm,.dot,.pc,.pconf,.prow,.picks{}

/* leaderboard */
.sectitle{font-family:'Space Grotesk';font-weight:600;font-size:19px;margin:6px 0 10px;}
.lbbar{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 16px;}
.lbchip{padding:7px 13px;border-radius:999px;border:1px solid var(--line);color:var(--muted);font:500 12px 'Inter';background:var(--panel);}
.lbchip.on{background:var(--claude);border-color:var(--claude);color:#08101F;}
.brow{display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius-lg);padding:13px 15px;margin-bottom:10px;max-width:680px;}
.rank{font-family:'Space Grotesk';font-weight:700;font-size:24px;color:var(--dim);width:24px;}
.brow:first-of-type .rank{color:var(--claude);}
.bmain{flex:1;min-width:0;}
.bname{display:flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:600;font-size:16px;margin-bottom:7px;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rec{color:var(--dim);font-size:12px;}
.pips{display:flex;gap:3px;}
.pip{width:16px;height:16px;border-radius:4px;font:600 9px 'IBM Plex Mono';display:flex;align-items:center;justify-content:center;color:#08101F;}
.pip-W{background:var(--value);}.pip-L{background:var(--loss);}.pip-D{background:var(--muted);}
.bstats{display:flex;gap:14px;}
.stat{text-align:right;}.stat b{display:block;font-size:14px;}.stat span{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
.lockstat b{font-size:13px;}
.pos,.stat b.pos{color:var(--value);}.neg{color:var(--loss);}
.note{font-size:11.5px;color:var(--dim);margin-top:6px;}

/* pricing */
.eyebrow2{font:600 11px 'IBM Plex Mono';letter-spacing:2px;text-transform:uppercase;color:var(--claude);}
.hero-h1,.legal b{}
.pp,.pl{font-family:'Space Grotesk';}
.unlock{margin:16px 0 22px;max-width:560px;}
.uhead{display:grid;grid-template-columns:1fr 46px 46px;padding-bottom:8px;}
.uhead span:nth-child(2){text-align:center;font:600 12px 'IBM Plex Mono';color:var(--dim);}
.uhead span:last-child{text-align:center;font:600 12px 'IBM Plex Mono';color:var(--claude);}
.urow{display:grid;grid-template-columns:1fr 46px 46px;align-items:center;padding:10px 0;border-top:1px solid var(--line-soft);}
.uf{font-size:14px;color:var(--ink-2);}
.chk{text-align:center;font-weight:700;}.chk.on{color:var(--value);}.chk.off{color:#37425C;}
.plan{position:relative;display:grid;grid-template-columns:1fr auto;grid-template-areas:"l p" "s p";width:100%;max-width:560px;text-align:left;border:1.5px solid var(--line);background:var(--panel);border-radius:var(--radius-lg);padding:15px 17px;margin-bottom:11px;row-gap:3px;transition:.15s;}
.plan:hover{border-color:#2C3B57;}
.plan.sel{border-color:var(--claude);background:var(--raise);}
.pl{grid-area:l;font-weight:600;font-size:19px;}
.ps{grid-area:s;font-size:12px;color:var(--muted);}
.pp{grid-area:p;align-self:center;font-weight:600;font-size:19px;}
.pp i{font-style:normal;font-size:12px;color:var(--muted);}
.tag{position:absolute;top:-9px;left:15px;background:var(--value);color:#08140C;font:600 10px 'IBM Plex Mono';letter-spacing:.5px;padding:2px 9px;border-radius:6px;}
.cta{width:100%;max-width:560px;background:linear-gradient(135deg,var(--claude),#5FF9FF);color:#08101F;font:600 16px 'Space Grotesk';padding:16px;border-radius:var(--radius-lg);margin-top:8px;box-shadow:0 16px 38px -16px rgba(0,240,255,.7);}
.cta-note{color:var(--dim);font-size:12px;margin-top:10px;max-width:560px;}
.legal{color:var(--dim);font-size:11.5px;line-height:1.55;margin-top:22px;border-top:1px solid var(--line-soft);padding-top:16px;max-width:560px;}
.legal b{color:var(--muted);}
.pro-active{text-align:center;padding:44px 10px;}
.pro-active .check{width:66px;height:66px;border-radius:50%;background:rgba(0,230,118,.14);color:var(--value);font-size:32px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.pro-active h2{font-family:'Space Grotesk';font-size:28px;}
.pro-active p{color:var(--muted);margin:8px 0 20px;}
.ghost{color:var(--muted);font-size:14px;text-decoration:underline;margin:0 10px;}

/* upload */
.uphelp{color:var(--muted);font-size:13px;line-height:1.55;margin-bottom:13px;max-width:640px;}
.drop{max-width:640px;border:2px dashed var(--line);border-radius:var(--radius-lg);padding:28px 16px;text-align:center;cursor:pointer;background:var(--panel);transition:.15s;}
.drop:hover,.drop.over{border-color:var(--claude);background:var(--raise);}
.drop b{display:block;font-family:'Space Grotesk';font-size:17px;margin-bottom:4px;}
.drop span{font-size:13px;color:var(--dim);}
.tpllink{display:inline-block;margin-top:9px;color:var(--claude);font-size:12px;text-decoration:underline;cursor:pointer;}
.upmsg{margin-top:14px;font-size:13px;min-height:18px;}
.upmsg.ok{color:var(--value);}.upmsg.err{color:var(--loss);}

/* age gate */
.gate{min-height:88vh;display:flex;flex-direction:column;max-width:620px;}
.gate .mark{font-size:24px;}
.gate-body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:15px;}
.badge18{width:62px;height:62px;border-radius:var(--radius-lg);background:var(--claude);color:#08101F;font:700 24px 'Space Grotesk';display:flex;align-items:center;justify-content:center;}
.gate h1{font-family:'Space Grotesk';font-weight:700;font-size:34px;letter-spacing:-1px;}
.gate p{color:var(--muted);font-size:15px;line-height:1.6;}
.gate-foot{color:var(--dim);font-size:12px;}
.livechip{font:600 9px 'IBM Plex Mono';padding:2px 6px;border-radius:5px;letter-spacing:.5px;color:var(--dim);background:var(--raise);vertical-align:middle;margin-left:4px;}
.livechip.on{color:#08140C;background:var(--value);}
@media (max-width:640px){.shell{padding:18px 15px 60px;}.grid{grid-template-columns:1fr;}.hero-stats{gap:10px;}.hstat{min-width:calc(50% - 6px);}}
.oddlist{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.oddrow{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius-md);padding:8px 12px;}
.ol-label{font-size:12.5px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ol-price{font-family:"IBM Plex Mono";font-size:13px;color:var(--ink);flex:0 0 auto;}
.oddmore{font-size:11px;color:var(--dim);padding:2px 2px;}
.odd span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.apibar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-md);padding:11px 14px;margin-bottom:18px;font-size:13px;color:var(--muted);}
.apibar code{font-family:"IBM Plex Mono";color:var(--claude);font-size:12px;word-break:break-all;}
.apiedit{background:var(--raise);border:1px solid var(--line);color:var(--ink-2);font:600 11px "Inter";padding:6px 11px;border-radius:8px;}
.apiedit:hover{border-color:var(--claude);color:var(--claude);}
.reel{margin:2px 0 26px;}
.reel-head{display:flex;align-items:baseline;gap:12px;margin-bottom:13px;flex-wrap:wrap;}
.reel-title{font-family:"Space Grotesk";font-weight:700;font-size:19px;letter-spacing:-.3px;}
.reel-sub{color:var(--muted);font-size:13px;}
.reel-track{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 8px;}
.reel-track::-webkit-scrollbar{height:6px;}.reel-track::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.vcard{flex:0 0 236px;background:linear-gradient(180deg,rgba(0,230,118,.07),var(--panel2));border:1px solid rgba(0,230,118,.30);border-radius:var(--radius-lg);padding:14px;box-shadow:0 14px 32px -22px rgba(0,230,118,.55);transition:.16s;}
.vcard:hover{border-color:var(--value);transform:translateY(-3px);}
.vc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;}
.vc-sport{font:600 9.5px "IBM Plex Mono";letter-spacing:1px;text-transform:uppercase;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:62%;}
.vc-edge{font:700 15px "IBM Plex Mono";color:var(--value);flex:0 0 auto;}
.vc-match{font-family:"Space Grotesk";font-weight:600;font-size:15px;line-height:1.15;margin-bottom:3px;}
.vc-match i{font-style:normal;color:var(--dim);font-size:11px;}
.vc-mkt{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;}
.vc-pick{font-size:14px;color:var(--claude);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vc-pick.locked-pick{color:var(--muted);font-weight:500;font-size:12.5px;}
.stars{display:inline-flex;gap:1px;}
.stars .st{font-style:normal;font-size:13px;color:#2A3653;}
.stars .st.on{color:#FFC94D;text-shadow:0 0 8px rgba(255,201,77,.5);}
.stakeline{margin-top:9px;font-size:12px;color:var(--muted);}
.stakeline b{color:var(--value);font-family:"IBM Plex Mono";}
.stakeline i{font-style:normal;color:var(--dim);font-size:11px;}
.starbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px;}
.starchip{padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font:600 12px "Inter";}
.starchip.on{background:#FFC94D;border-color:#FFC94D;color:#161001;}
.trbox{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px;margin-bottom:20px;max-width:680px;}
.trhead{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.trpl{font-family:"IBM Plex Mono";font-weight:700;font-size:30px;letter-spacing:-1px;}
.trpl.pos{color:var(--value);}.trpl.neg{color:var(--loss);}
.trsub{color:var(--muted);font-size:13px;}
.spark{width:100%;height:64px;margin:4px 0 12px;}
.trstats{display:flex;gap:10px;flex-wrap:wrap;}
.trstats .hstat{padding:10px 14px;min-width:105px;}
.trstats .hstat b{font-size:19px;}
.rrow{display:flex;align-items:center;gap:10px;padding:9px 2px;border-top:1px solid var(--line-soft);font-size:12.5px;}
.rres{width:18px;text-align:center;font-weight:700;}.rres.w{color:var(--value);}.rres.l{color:var(--loss);}
.rev{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-2);}

 else if(a==="sport"){S.sport=el.getAttribute("data-s");S.lbMarket="all";window.scrollTo(0,0);}
 else if(a==="mkt"){S.mkt[el.getAttribute("data-g")]=el.getAttribute("data-m");}
 else if(a==="pro"){S.tab="pricing";window.scrollTo(0,0);}
 else if(a==="plan"){S.plan=el.getAttribute("data-p");}
 else if(a==="subscribe"){S.pro=true;window.scrollTo(0,0);}
 else if(a==="reset"){S.pro=false;}
 else if(a==="admin"){S.admin=false;try{localStorage.removeItem("orakl_admin_key");}catch(e){}window.scrollTo(0,0);}
 else if(a==="lbmkt"){S.lbMarket=el.getAttribute("data-m");}
 else if(a==="starmin"){S.starMin=Number(el.getAttribute("data-n"))||0;}
 else if(a==="gotomatch"){S.tab="matches";S.sport=el.getAttribute("data-sport")||S.sport;S.starMin=0;window.scrollTo(0,0);}
 else if(a==="delgame"){var du=(window.__US||[])[el.getAttribute("data-i")];if(!du)return;
  if(!window.confirm("Delete "+du.home+(du.away?" v "+du.away:"")+" and its "+du.npicks+" picks? This cannot be undone."))return;
  fetch(API_BASE+"/api/fixture/delete",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Key":adminKey()},body:JSON.stringify({id:du.id})})
   .then(function(r){return r.json();}).then(function(){UNSETTLED=null;LOADING_US=false;LIVEGAMES={};LOADING={};TOPVALUE=null;LOADING_TV=false;render();});
  return;}
 else if(a==="clearfin"){if(!window.confirm("Delete ALL listed games and their picks? Settle the ones you know scores for first \u2014 this cannot be undone."))return;
  var mcf=document.getElementById("upmsg");
  fetch(API_BASE+"/api/clear-finished",{method:"POST",headers:{"X-Admin-Key":adminKey()}})
   .then(function(r){return r.json();}).then(function(d){if(mcf){mcf.className="upmsg ok";mcf.textContent="\ud83d\uddd1 Deleted "+d.deleted+" old games.";}UNSETTLED=null;LOADING_US=false;LIVEGAMES={};LOADING={};TOPVALUE=null;LOADING_TV=false;render();});
  return;}
 else if(a==="m-add"){fetch(API_BASE+"/api/compounding/bet",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Key":adminKey()},body:JSON.stringify({fixture_id:el.getAttribute("data-fid"),market:el.getAttribute("data-mk"),option:el.getAttribute("data-op"),odds:Number(el.getAttribute("data-od")),fairOdds:Number(el.getAttribute("data-fair"))})}).then(function(r){return r.json();}).then(function(d){MISSION=d;S.tab="mission";window.scrollTo(0,0);render();});return;}
 else if(a==="m-start"){fetch(API_BASE+"/api/compounding/run",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Key":adminKey()},body:"{}"}).then(function(r){return r.json();}).then(function(d){MISSION=d;render();});return;}
 else if(a==="m-reset"){if(!window.confirm("Reset the run back to \u20ac100? The current journey is archived."))return;fetch(API_BASE+"/api/compounding/run",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Key":adminKey()},body:"{}"}).then(function(r){return r.json();}).then(function(d){MISSION=d;render();});return;}
 else if(a==="m-win"||a==="m-loss"){var id=el.getAttribute("data-id");fetch(API_BASE+"/api/compounding/settle",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Key":adminKey()},body:JSON.stringify({id:Number(id),result:a==="m-win"?"win":"loss"})}).then(function(r){return r.json();}).then(function(d){MISSION=d;render();});return;}
 else if(a==="fixdates"){var mfd=document.getElementById("upmsg");if(mfd){mfd.className="upmsg";mfd.textContent="Moving games back to the Live Feed\u2026";}
  fetch(API_BASE+"/api/fix-dates",{method:"POST",headers:{"X-Admin-Key":adminKey()}})
   .then(function(r){if(r.status===401)throw new Error("Invalid admin key");return r.json();})
   .then(function(d){if(mfd){mfd.className="upmsg ok";mfd.textContent="\u2705 Moved "+d.moved+" games back to the Live Feed (re-dated "+d.kickoff+"). They\u2019ll re-price automatically.";}UNSETTLED=null;LOADING_US=false;LIVEGAMES={};LOADING={};TOPVALUE=null;LOADING_TV=false;render();})
   .catch(function(e){if(mfd){mfd.className="upmsg err";mfd.textContent="Failed: "+e.message;}});
  return;}
 else if(a==="settle"){var i=el.getAttribute("data-i");var u=(window.__US||[])[i];if(!u)return;
  var hEl=document.getElementById("st-h-"+i),aEl=document.getElementById("st-a-"+i);
  var hs=hEl?hEl.value:"",as=aEl?aEl.value:"";
  if(hs===""||as===""){var mm=document.getElementById("upmsg");if(mm){mm.className="upmsg err";mm.textContent="Type both scores first.";}return;}
  var mg=document.getElementById("upmsg");if(mg){mg.className="upmsg";mg.textContent="Settling\u2026";}
  fetch(API_BASE+"/api/settle",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Key":adminKey()},body:JSON.stringify({id:u.id,hs:Number(hs),as:Number(as)})})
   .then(function(r){if(r.status===401)throw new Error("Invalid admin key");return r.json();})
   .then(function(d){if(mg){mg.className="upmsg ok";mg.textContent="Settled "+u.home+" "+d.score+(u.away?" "+u.away:"")+" \u2014 graded "+d.graded+" picks"+(d.skipped?" ("+d.skipped+" need results CSV)":"")+".";}UNSETTLED=null;LOADING_US=false;TRACK=null;LOADING_TR=false;LIVELB={};LOADINGLB={};render();})
   .catch(function(e){if(mg){mg.className="upmsg err";mg.textContent="Settle failed: "+e.message;}});
  return;}
 else if(a==="plan-m"){S.plan="monthly";render();return;}
 else if(a==="plan-y"){S.plan="annual";render();return;}
 else if(a==="noop"){return;}
 else if(a==="subscribe"){
   if(S.pro||S.admin){return;}
   var note=document.getElementById("subnote");if(note){note.textContent="Opening secure checkout\u2026";}
   fetch(API_BASE+"/api/stripe/create-checkout-session",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({plan:S.plan})})
    .then(function(r){return r.json();})
    .then(function(d){if(d.url){window.location.href=d.url;}else{if(note){note.className="plan-note err";note.textContent=d.error==="billing not configured yet"?"Checkout is being set up \u2014 launching soon.":("Could not start checkout: "+(d.error||"unknown"));}}})
    .catch(function(e){if(note){note.className="plan-note err";note.textContent="Network error: "+e.message;}});
   return;}
 else if(a==="gear"){S.gear=true;render();return;}
 else if(a==="gear-close"){closeGear();return;}
 else if(a==="setkey"){var nk=window.prompt("Admin key (must match ADMIN_KEY on the backend):",adminKey());if(nk!=null){try{localStorage.setItem("orakl_admin_key",nk.trim());}catch(e){}S.admin=!!nk.trim();}return;}
 else if(a==="setapi"){var cur=API_BASE||"";var u=window.prompt("Your backend URL (from Render):",cur);if(u!=null){u=u.trim().replace(/\/$/,"");try{if(u)localStorage.setItem("prophit_api",u);else localStorage.removeItem("prophit_api");}catch(e){}location.reload();}return;}
 else if(a==="tpl"){upDownloadTpl(el.getAttribute("data-kind"));return;}
 else if(a==="pick"){var kind=el.getAttribute("data-kind");var inp=document.createElement("input");inp.type="file";inp.accept=".csv,text/csv";inp.onchange=function(){if(inp.files[0])upReadFile(inp.files[0],kind);};inp.click();return;}
 render();
});
render();
})();
</script>
</body>
</html>
